name: Deploy Backend & Yjs to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy Backend
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'notes-backend'
          source: './backend'
          region: '${{ env.REGION }}'
          flags: |
            --allow-unauthenticated
            --set-secrets="/app/secrets/firebase-key.json=firebase-credentials:latest"
            --set-env-vars="FIREBASE_AUTH_KEY_PATH=/app/secrets/firebase-key.json"

      - name: Print Backend URL
        run: echo "Backend deployed to ${{ steps.deploy.outputs.url }}"

  deploy-yjs:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy Yjs Server
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'notes-yjs-server'
          source: './yjs-server'
          region: '${{ env.REGION }}'
          flags: '--allow-unauthenticated'

      - name: Print Yjs URL
        run: echo "Yjs deployed to ${{ steps.deploy.outputs.url }}"
